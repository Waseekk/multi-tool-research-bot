[server]
headless = true
enableCORS = false
enableXsrfProtection = false
# Prevents Streamlit from eagerly importing every installed package (e.g. transformers
# vision models) just to watch them for changes. Those packages import torchvision which
# is not installed, flooding the log with hundreds of harmless ModuleNotFoundError lines.
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#FF4B4B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"